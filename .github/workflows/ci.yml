name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate DESIGN.md
        run: npm run lint:design

      - name: Rebuild design tokens
        run: npm run build:tokens

      - name: Build registry artifacts
        run: npm run build:registry

      - name: Next.js production build
        run: npm run build

      - name: Upload registry JSON
        uses: actions/upload-artifact@v4
        with:
          name: registry-json
          path: public/r/
          retention-days: 7

      - name: Deploy to Netlify
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx netlify-cli@latest deploy --prod --site 3b49c8d2-25fb-4d11-a5b9-66c73812fcee
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

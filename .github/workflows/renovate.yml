name: Renovate

on:
  schedule:
    # Monday 5am UTC = 6am Africa/Casablanca (matches renovate.json schedule)
    - cron: "0 5 * * 1"
  workflow_dispatch:

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    name: Renovate dependency updates
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.14
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN || github.token }}
